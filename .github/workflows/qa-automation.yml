name: QA Automation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  qa-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_BASE_URL: 'http://localhost:8080'
      API_BASE_URL: 'http://localhost:8080'
      UI_BASE_URL: 'http://localhost:8080'
      TEST_USERNAME: 'test.user'
      TEST_PASSWORD: 'ChangeMe123!'
      INVALID_TEST_PASSWORD: 'WrongPassword123!'
      SKIP_ON_UNREACHABLE: 'false'
      UI_HEADLESS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Start mock server
        run: |
          python mock_server.py &
          sleep 2
          curl -s http://localhost:8080/login > /dev/null && echo "Mock server is up" || echo "Mock server failed"

      - name: Run tests
        run: |
          mkdir -p test-results
          pytest \
            --junitxml=test-results/pytest-report.xml \
            --html=test-results/report.html \
            --self-contained-html \
            || true

      - name: Quality gate check
        run: python quality_gate.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
